<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist Cumple 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
  :root{
    --arena:#FFF6E9;
    --arena-2:#FFEFD6;
    --coral:#FF6B5C;
    --coral-dark:#E8503F;
    --mar:#1FB6C1;
    --mar-dark:#138C95;
    --sol:#FFC94D;
    --noche:#1A3A52;
    --noche-soft:#2C5470;
    --r:26px;
    --shadow:0 18px 40px -18px rgba(26,58,82,.35);
    --shadow-hover:0 32px 60px -20px rgba(26,58,82,.45);
  }

  *{box-sizing:border-box;margin:0;padding:0}

  html{scroll-behavior:smooth}

  body{
    font-family:'DM Sans',sans-serif;
    color:var(--noche);
    background:transparent;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Fondo ambiental ---------- */
  .sky{
    position:fixed;inset:0;z-index:-3;
    background:linear-gradient(180deg,#FFE6B8 0%,#FFD9C2 35%,var(--arena) 70%);
  }
  .sun{
    position:fixed;
    top:-90px;left:50%;
    width:340px;height:340px;
    margin-left:-170px;
    border-radius:50%;
    background:radial-gradient(circle at 50% 50%,#FFE08A 0%,var(--sol) 45%,#FFB23E 75%,rgba(255,178,62,0) 78%);
    z-index:-2;
    animation:sunPulse 7s ease-in-out infinite;
    filter:blur(.3px);
  }
  @keyframes sunPulse{
    0%,100%{transform:scale(1)}
    50%{transform:scale(1.06)}
  }
  /* olas SVG al fondo */
  .waves{
    position:fixed;bottom:0;left:0;width:100%;z-index:15;line-height:0;
    pointer-events:none;
  }
  .waves svg{width:200%;height:150px;display:block}
  /* cuerpo de agua sólido bajo las olas: aquí las tarjetas quedan totalmente sumergidas */
  .water-body{
    position:fixed;bottom:0;left:0;width:100%;height:45px;z-index:15;
    background:linear-gradient(180deg,#138C95,#0d6f77);
    pointer-events:none;
  }
  /* capa translúcida sobre la cresta para que se intuya la tarjeta al sumergirse */
  .waves.front{z-index:16}
  .waves.front svg{opacity:.92}
  .waves.back{z-index:14;opacity:.7}
  .wave-move{animation:waveSlide 14s linear infinite}
  .wave-move-2{animation:waveSlide 20s linear infinite reverse}
  @keyframes waveSlide{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  /* fuegos artificiales */
  .fireworks{
    position:fixed;inset:0;width:100%;height:100%;
    z-index:-1;pointer-events:none;
  }

  /* partículas burbujas */
  .bubbles{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none}
  .bubble{
    position:absolute;bottom:-60px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.8),rgba(31,182,193,.25));
    animation:rise linear infinite;
  }
  @keyframes rise{
    0%{transform:translateY(0) scale(.6);opacity:0}
    10%{opacity:.7}
    90%{opacity:.5}
    100%{transform:translateY(-110vh) scale(1.1);opacity:0}
  }

  /* ---------- Layout ---------- */
  .wrap{max-width:1180px;margin:0 auto;padding:0 22px}

  header.hero{
    text-align:center;
    padding:88px 22px 40px;
    position:relative;
  }
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;
    background:rgba(255,255,255,.65);
    backdrop-filter:blur(6px);
    border:1px solid rgba(255,255,255,.8);
    color:var(--coral-dark);
    font-weight:600;font-size:.82rem;letter-spacing:.04em;
    padding:8px 16px;border-radius:50px;
    box-shadow:var(--shadow);
    opacity:0;animation:dropIn .7s .1s forwards;
  }
  .hero h1{
    font-family:'Fredoka',sans-serif;
    font-weight:700;
    font-size:clamp(2.6rem,7vw,5rem);
    line-height:1.02;
    margin:22px 0 14px;
    color:var(--noche);
    letter-spacing:-.01em;
  }
  .hero h1 .pop{
    color:var(--coral);
    display:inline-block;
    animation:wiggle 3.5s ease-in-out infinite;
  }
  @keyframes wiggle{
    0%,100%{transform:rotate(-2deg)}
    50%{transform:rotate(2deg)}
  }
  .hero p.sub{
    font-size:clamp(1rem,2.2vw,1.22rem);
    color:var(--noche-soft);
    max-width:560px;margin:0 auto;
    opacity:0;animation:dropIn .7s .35s forwards;
  }
  @keyframes dropIn{
    from{opacity:0;transform:translateY(-14px)}
    to{opacity:1;transform:translateY(0)}
  }

  /* contador resumen */
  .stats{
    display:flex;gap:14px;justify-content:center;flex-wrap:wrap;
    margin-top:30px;
    opacity:0;animation:dropIn .7s .5s forwards;
  }
  .stat{
    background:#fff;border-radius:18px;padding:14px 22px;
    box-shadow:var(--shadow);min-width:120px;
    border:1px solid rgba(255,255,255,.9);
  }
  .stat b{font-family:'Fredoka';font-size:1.6rem;color:var(--mar-dark);display:block;line-height:1}
  .stat span{font-size:.78rem;color:var(--noche-soft);font-weight:500}

  /* ---------- Filtros ---------- */
  .controls{
    display:flex;gap:10px;justify-content:center;flex-wrap:wrap;
    margin:46px 0 8px;
    position:sticky;top:0;z-index:30;
    padding:14px 0;
  }
  .controls::before{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,var(--arena) 60%,rgba(255,246,233,0));
    z-index:-1;
  }
  .chip{
    font-family:'DM Sans';font-weight:600;font-size:.9rem;
    border:2px solid var(--noche);
    background:#fff;color:var(--noche);
    padding:9px 18px;border-radius:50px;cursor:pointer;
    transition:transform .25s cubic-bezier(.34,1.56,.64,1),background .25s,color .25s,box-shadow .25s;
  }
  .chip:hover{transform:translateY(-3px) scale(1.04)}
  .chip.active{background:var(--coral);border-color:var(--coral);color:#fff;box-shadow:var(--shadow)}
  .chip:focus-visible{outline:3px solid var(--mar);outline-offset:2px}

  /* ---------- Grid de tarjetas ---------- */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
    gap:26px;
    padding:30px 0 160px;
    position:relative;z-index:1;
  }
  .card{
    background:#fff;border-radius:var(--r);overflow:hidden;
    box-shadow:var(--shadow);position:relative;
    display:flex;flex-direction:column;
    border:1px solid rgba(255,255,255,.9);
    transition:transform .4s cubic-bezier(.22,1,.36,1),box-shadow .4s;
    opacity:0;transform:translateY(60px) scale(.96);
  }
  .card.in{opacity:1;transform:translateY(0) scale(1);
    transition:opacity .8s cubic-bezier(.22,1,.36,1),transform .8s cubic-bezier(.22,1,.36,1);}
  .card:hover{transform:translateY(-10px) rotate(-.4deg);box-shadow:var(--shadow-hover)}

  .card .ph{position:relative;aspect-ratio:16/11;overflow:hidden;background:var(--arena-2)}
  .card .ph img{
    width:100%;height:100%;object-fit:cover;display:block;
    transition:transform .7s cubic-bezier(.22,1,.36,1);
  }
  .card:hover .ph img{transform:scale(1.09)}
  .card .ph::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(0,0,0,0) 55%,rgba(26,58,82,.28));
  }

  .badges{position:absolute;top:12px;left:12px;display:flex;gap:7px;flex-wrap:wrap;z-index:2}
  .badge{
    font-size:.72rem;font-weight:700;letter-spacing:.02em;
    padding:5px 11px;border-radius:50px;color:#fff;
    backdrop-filter:blur(3px);
    box-shadow:0 4px 12px -4px rgba(0,0,0,.4);
  }
  .badge.cat{background:rgba(26,58,82,.78)}
  .prio{
    position:absolute;top:12px;right:12px;z-index:2;
    font-size:.72rem;font-weight:700;
    padding:5px 11px 5px 24px;border-radius:50px;color:#fff;
    box-shadow:0 4px 12px -4px rgba(0,0,0,.4);
  }
  .prio::before{
    content:"";position:absolute;left:9px;top:50%;width:8px;height:8px;
    margin-top:-4px;border-radius:50%;background:#fff;
    animation:blink 1.6s ease-in-out infinite;
  }
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
  .prio.alta{background:var(--coral)}
  .prio.media{background:var(--mar)}
  .prio.baja{background:var(--noche-soft)}

  .card .body{padding:18px 20px 22px;display:flex;flex-direction:column;flex:1}
  .card h3{font-family:'Fredoka';font-weight:600;font-size:1.22rem;line-height:1.18;margin-bottom:8px}
  .card .desc{font-size:.9rem;color:var(--noche-soft);line-height:1.5;flex:1}

  .price{
    font-family:'Fredoka';font-weight:600;font-size:1.5rem;color:var(--mar-dark);
    margin:16px 0 14px;display:flex;align-items:baseline;gap:5px;
  }
  .price small{font-size:.78rem;font-weight:500;color:var(--noche-soft)}

  .links{display:flex;gap:9px;flex-wrap:wrap}
  .links a{
    flex:1 1 auto;text-align:center;text-decoration:none;
    font-weight:600;font-size:.86rem;
    padding:11px 14px;border-radius:14px;
    background:var(--noche);color:#fff;
    transition:transform .25s cubic-bezier(.34,1.56,.64,1),background .25s;
    position:relative;overflow:hidden;
  }
  .links a:hover{transform:translateY(-3px);background:var(--coral)}
  .links a:focus-visible{outline:3px solid var(--mar);outline-offset:2px}
  .links a::after{
    content:"↗";margin-left:6px;display:inline-block;
    transition:transform .25s;
  }
  .links a:hover::after{transform:translate(3px,-3px)}

  /* estado vacío / carga */
  .msg{
    grid-column:1/-1;text-align:center;padding:60px 20px;
    color:var(--noche-soft);font-size:1.05rem;
  }
  .loader{
    width:46px;height:46px;border-radius:50%;margin:0 auto 18px;
    border:5px solid var(--arena-2);border-top-color:var(--coral);
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}

  footer{
    text-align:center;padding:30px 22px 50px;
    color:var(--noche-soft);font-size:.86rem;
    position:relative;z-index:20;
  }
  footer b{color:var(--coral-dark)}

  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important;scroll-behavior:auto!important}
    .card{opacity:1;transform:none}
  }
</style>
</head>
<body>

<div class="sky"></div>
<div class="sun"></div>
<canvas class="fireworks" id="fw" aria-hidden="true"></canvas>
<div class="bubbles" id="bubbles"></div>
<div class="water-body" aria-hidden="true"></div>
<div class="waves back" aria-hidden="true" style="bottom:37px">
  <svg viewBox="0 0 1440 140" preserveAspectRatio="none" class="wave-move-2">
    <path fill="#1FB6C1" d="M0,80 C240,140 480,20 720,70 C960,120 1200,30 1440,80 L1440,140 L0,140 Z M1440,80 C1680,140 1920,20 2160,70 C2400,120 2640,30 2880,80 L2880,140 L1440,140 Z"/>
  </svg>
</div>
<div class="waves front" aria-hidden="true" style="bottom:33px">
  <svg viewBox="0 0 1440 140" preserveAspectRatio="none" class="wave-move">
    <path fill="#138C95" d="M0,95 C220,55 460,135 720,90 C980,45 1180,125 1440,90 L1440,140 L0,140 Z M1440,95 C1660,55 1900,135 2160,90 C2420,45 2620,125 2880,90 L2880,140 L1440,140 Z"/>
  </svg>
</div>

<header class="hero">
  <span class="eyebrow">☀️ Edición 2026</span>
  <h1 id="titulo">Mi <span class="pop">Wishlist</span></h1>
  <p class="sub" id="subtitulo">Cargando deseos…</p>
  <div class="stats" id="stats"></div>
</header>

<div class="wrap">
  <nav class="controls" id="controls" aria-label="Filtrar regalos"></nav>

  <main class="grid" id="grid">
    <div class="msg"><div class="loader"></div>Sacando la lista de la mochila de playa…</div>
  </main>
</div>

<footer>
  Hecho con sol, mar y <b>cariño</b> · edita <b>wishlist.json</b> para cambiar los regalos
</footer>

<script>
const $ = (s,c=document)=>c.querySelector(s);
const $$ = (s,c=document)=>[...c.querySelectorAll(s)];
const reduceMotion = matchMedia('(prefers-reduced-motion:reduce)').matches;

/* burbujas ambientales */
(function(){
  if(reduceMotion) return;
  const b=$('#bubbles');
  for(let i=0;i<16;i++){
    const d=document.createElement('div');
    const size=8+Math.random()*34;
    d.className='bubble';
    d.style.left=Math.random()*100+'vw';
    d.style.width=d.style.height=size+'px';
    d.style.animationDuration=(9+Math.random()*12)+'s';
    d.style.animationDelay=(-Math.random()*14)+'s';
    b.appendChild(d);
  }
})();

/* fuegos artificiales de cumpleaños */
(function(){
  if(reduceMotion) return;
  const cv=$('#fw'), ctx=cv.getContext('2d');
  let W,H,DPR;
  function resize(){
    DPR=Math.min(window.devicePixelRatio||1,2);
    W=cv.width=innerWidth*DPR; H=cv.height=innerHeight*DPR;
    cv.style.width=innerWidth+'px'; cv.style.height=innerHeight+'px';
  }
  resize(); addEventListener('resize',resize);

  const COLORS=['#FF2D6B','#FF6B00','#FFD400','#20E070','#00C2FF','#3B5BFF','#B14BFF','#FF3DDA','#FF1744'];
  const rockets=[], sparks=[];
  const rand=(a,b)=>a+Math.random()*(b-a);

  function launch(){
    rockets.push({
      x:rand(W*.15,W*.85), y:H,
      vy:rand(-14,-19)*DPR, vx:rand(-1.5,1.5)*DPR,
      color:COLORS[(Math.random()*COLORS.length)|0],
      target:rand(H*.12,H*.42)
    });
  }

  function explode(x,y,color){
    const n=52+((Math.random()*28)|0);
    for(let i=0;i<n;i++){
      const a=(Math.PI*2*i)/n, sp=rand(2.2,7)*DPR;
      sparks.push({
        x,y,
        vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
        life:1, decay:rand(.010,.022),
        color:Math.random()<.12?'#fff':color,
        size:rand(2,3.4)*DPR
      });
    }
  }

  function tick(){
    // rastro sutil: aclara ligeramente el frame anterior (estela corta)
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='rgba(255,246,233,.30)';
    ctx.fillRect(0,0,W,H);

    for(let i=rockets.length-1;i>=0;i--){
      const r=rockets[i];
      r.x+=r.vx; r.y+=r.vy; r.vy+=.16*DPR;
      ctx.beginPath();
      ctx.fillStyle=r.color;
      ctx.shadowColor=r.color; ctx.shadowBlur=12;
      ctx.arc(r.x,r.y,2.6*DPR,0,7);
      ctx.fill();
      if(r.vy>=0 || r.y<=r.target){ explode(r.x,r.y,r.color); rockets.splice(i,1); }
    }

    for(let i=sparks.length-1;i>=0;i--){
      const s=sparks[i];
      s.x+=s.vx; s.y+=s.vy; s.vy+=.05*DPR; s.vx*=.985; s.vy*=.985;
      s.life-=s.decay;
      if(s.life<=0){ sparks.splice(i,1); continue; }
      ctx.globalAlpha=Math.max(s.life,0);
      ctx.fillStyle=s.color;
      ctx.shadowColor=s.color; ctx.shadowBlur=10;
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.size,0,7);
      ctx.fill();
    }
    ctx.shadowBlur=0;
    ctx.globalAlpha=1;
    requestAnimationFrame(tick);
  }
  tick();

  // lanza en tandas festivas
  setInterval(()=>{ if(document.hidden) return;
    launch(); if(Math.random()<.5) setTimeout(launch,rand(150,450)); }, 900);
  // salva de bienvenida
  setTimeout(()=>{launch();launch();},600);
})();

const PRIO_ORDER={alta:0,media:1,baja:2};
const PRIO_LABEL={alta:'Prioridad alta',media:'Prioridad media',baja:'Prioridad baja'};
let DATA=null, activeCat='Todo';

const fmt = (n,cur)=> new Intl.NumberFormat('es-ES').format(n)+' '+cur;

async function load(){
  try{
    const res = await fetch('wishlist.json',{cache:'no-store'});
    if(!res.ok) throw new Error(res.status);
    DATA = await res.json();
    render();
  }catch(e){
    $('#grid').innerHTML =
      `<div class="msg">🏖️ No pude leer <b>wishlist.json</b>.<br>
       Asegúrate de abrir la web desde un servidor (o que el archivo esté al lado del HTML).</div>`;
    console.error(e);
  }
}

function render(){
  $('#titulo').innerHTML = DATA.titulo.replace('Wishlist','<span class="pop">Wishlist</span>');
  $('#subtitulo').textContent = DATA.subtitulo;

  const cur = DATA.moneda||'€';
  const items = DATA.regalos;
  const total = items.reduce((a,r)=>a+(+r.precio||0),0);
  const altas = items.filter(r=>r.prioridad==='alta').length;

  $('#stats').innerHTML = `
    <div class="stat"><b>${items.length}</b><span>deseos</span></div>
    <div class="stat"><b>${altas}</b><span>imprescindibles</span></div>
    <div class="stat"><b>${fmt(total,cur)}</b><span>valor total</span></div>`;

  // filtros
  const cats=['Todo',...new Set(items.map(r=>r.categoria))];
  $('#controls').innerHTML = cats.map(c=>
    `<button class="chip${c===activeCat?' active':''}" data-cat="${c}">${c}</button>`).join('');
  $$('#controls .chip').forEach(ch=>ch.onclick=()=>{
    activeCat=ch.dataset.cat;
    $$('#controls .chip').forEach(x=>x.classList.toggle('active',x===ch));
    paint();
  });

  paint();
}

function paint(){
  const cur = DATA.moneda||'€';
  let items=[...DATA.regalos].sort((a,b)=>
    (PRIO_ORDER[a.prioridad]??9)-(PRIO_ORDER[b.prioridad]??9) || b.precio-a.precio);
  if(activeCat!=='Todo') items=items.filter(r=>r.categoria===activeCat);

  const grid=$('#grid');
  if(!items.length){grid.innerHTML='<div class="msg">No hay nada en esta categoría 🐚</div>';return;}

  grid.innerHTML = items.map(r=>{
    const links=(r.links||[]).map(l=>
      `<a href="${l.url}" target="_blank" rel="noopener">${l.tienda}</a>`).join('');
    return `
    <article class="card">
      <div class="ph">
        <div class="badges"><span class="badge cat">${r.categoria}</span></div>
        <span class="prio ${r.prioridad}">${PRIO_LABEL[r.prioridad]||r.prioridad}</span>
        <img src="${r.foto}" alt="${r.nombre}" loading="lazy"
             onerror="this.style.opacity=0;this.parentElement.style.background='linear-gradient(135deg,#FFD9C2,#1FB6C1)'">
      </div>
      <div class="body">
        <h3>${r.nombre}</h3>
        <p class="desc">${r.descripcion||''}</p>
        <div class="price">${fmt(r.precio,cur)} <small>máximo</small></div>
        <div class="links">${links||'<span class="desc">Sin links aún</span>'}</div>
      </div>
    </article>`;
  }).join('');

  // reveal al hacer scroll
  const cards=$$('.card');
  if(reduceMotion){cards.forEach(c=>c.classList.add('in'));return;}
  const io=new IntersectionObserver((entries,obs)=>{
    entries.forEach(en=>{
      if(en.isIntersecting){
        setTimeout(()=>en.target.classList.add('in'), cards.indexOf(en.target)%4*70);
        obs.unobserve(en.target);
      }
    });
  },{threshold:.12});
  cards.forEach(c=>io.observe(c));
}

load();
</script>
</body>
</html>
